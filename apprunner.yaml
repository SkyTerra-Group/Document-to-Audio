version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install --upgrade pip
      - pip3 install -r requirements.txt
run:
  runtime-version: "3.11"
  command: python3 -m gunicorn --bind 0.0.0.0:8080 --workers 2 app:app
  network:
    port: 8080
  env:
    - name: PYTHONPATH
      value: /opt/app
